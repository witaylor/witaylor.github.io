<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume || Will Taylor</title>

    <link rel="stylesheet" href="/styles/output.css" />
  </head>
  <body class="font-sans text-lg leading-relaxed">
    <div class="bg-primary-blue text-white sticky top-0 z-50">
      <header class="pt-4 pb-3 px-8 max-w-screen-lg mx-auto">
        <div class="flex items-center">
          <a href="/#" class="text-2xl font-bold hidden sm:block">
            Will Taylor
          </a>

          <nav
            class="
              flex flex-1
              items-center
              justify-between
              min-w-full
              sm:min-w-0
              sm:justify-end
              list-none
              pb-1
            "
          >
            <li
              class="
                sm:ml-8
                px-2
                pt-1
                cursor-pointer
                rounded
                hover:bg-blue-300
                hover:shadow-sm
              "
            >
              <a
                href="/#projects"
                onclick="return highlightSection('#projects');"
                ><span class="hidden sm:inline">🔨</span> Projects</a
              >
            </li>
            <li
              class="
                sm:ml-8
                px-2
                pt-1
                cursor-pointer
                rounded
                hover:bg-blue-300
                hover:shadow-sm
              "
            >
              <a href="/#about" onclick="return highlightSection('#about');"
                ><span class="hidden sm:inline">👋</span> About</a
              >
            </li>
            <li
              class="
                sm:ml-8
                px-2
                pt-1
                cursor-pointer
                rounded
                hover:bg-blue-300
                hover:shadow-sm
              "
            >
              <a href="/#contact" onclick="return highlightSection('#contact');"
                ><span class="hidden sm:inline">📱</span> Contact</a
              >
            </li>
          </nav>
        </div>
      </header>
    </div>

    <main class="pt-4 pb-3 px-8 max-w-screen-lg mx-auto">
      <h1 class="text-3xl">My Resume</h1>

      <div class="my-4">
        <a
          download
          href="/res/resume/William_Taylor_Resume.pdf"
          class="pt-2 pb-1 px-2 bg-job-red rounded"
        >
          Download as PDF
        </a>
      </div>

      <img
        src="/res/resume/WT_Resume.svg"
        alt="my resume"
        class="min-w-full rounded-lg border"
      />
    </main>
  </body>
</html>
